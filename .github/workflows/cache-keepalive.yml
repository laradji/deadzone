# cache-keepalive — touches the per-lib artifact caches twice a week so their
# `last_accessed_at` stays under GitHub Actions' 7-day inactivity eviction.
#
# Decisions live in docs/research/batch-scrape-actions.md §3 "Cache
# keepalive" and #128:
#   - keepalive is cache-access only: NO `deadzone scrape` / consolidate /
#     dbrelease invocation, NO upload-artifact, NO embedder/ORT touch
#   - the artifact cache key shape is mirrored from scrape-pack.yml's
#     per-lib cache step; drift = different cache entry = no refresh.
#     Per-entry hash since #153 — both workflows pull cache_hash from
#     the same `deadzone scrape --list` output.
#   - Mon + Thu at 04:00 UTC gives a max gap of 4 days, well under the
#     7-day GHA eviction ceiling with margin for cron lag / runner
#     queueing
#   - orthogonal to #47 (freshness detection): we touch access time, not
#     content. When #47 lands it may supersede this workflow entirely.

name: cache-keepalive

on:
  schedule:
    # Mon + Thu 04:00 UTC — max gap 4d vs 7d GHA eviction.
    # Cadence is tuned against the hit-rate signal in the `report` job,
    # not adjusted on gut feel: tighten only if the report logs surface
    # persistent near-eviction misses; widen only after a sustained
    # hit-rate >0 demonstrates we have headroom.
    - cron: '0 4 * * 1,4'
  workflow_dispatch: {}

permissions:
  contents: read # no writes anywhere — keepalive never publishes

# Mirror scrape-pack.yml's CGO env: `go run -tags ORT ./cmd/deadzone` in
# expand-libs builds the full binary even though `--list` short-circuits
# before the embedder at runtime — build tags select files to compile,
# not symbols to link, so CGO_LDFLAGS is mandatory or `ld` can't find
# libtokenizers.a that install-native-deps unpacked into /tmp/deadzone-deps.
# Pinned tokenizers release lives in install-native-deps as the
# `tokenizers-version` input default — single source of truth (#158).
env:
  CGO_ENABLED: "1"
  CGO_LDFLAGS: -L/tmp/deadzone-deps/tokenizers

concurrency:
  # Serial by design: overlapping dispatches would race on the same
  # restore keys. A miss is not a failure, so cancel-in-progress: false
  # lets a slow run finish rather than dropping half the refreshes.
  group: cache-keepalive
  cancel-in-progress: false

jobs:
  expand-libs:
    name: expand-libs
    runs-on: ubuntu-latest
    outputs:
      libs: ${{ steps.list.outputs.libs }}
      # Exposed so the `report` job can reconstruct the full cache key
      # (artifact-<slug>-<version>-<entry_cache_hash>-<hugot_hash>) to
      # look up post-run hit/miss via the caches REST endpoint. The
      # entry-level segment is per-row in `libs` (see #153); only the
      # global trailing embedder hash is snapshotted here, since
      # hashFiles() is a GHA expression function and cannot be computed
      # in bash.
      embedder_hash: ${{ steps.key.outputs.embedder_hash }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Install native deps
        uses: ./.github/actions/install-native-deps
      - name: Emit resolved libs as JSON
        id: list
        # No --lib input: keepalive always touches every resolved
        # (lib, version) pair.
        uses: ./.github/actions/list-libs
      - name: Snapshot embedder hash
        id: key
        shell: bash
        run: |
          echo "embedder_hash=${{ hashFiles('internal/embed/hugot.go') }}" >> "$GITHUB_OUTPUT"

  refresh:
    name: refresh (${{ matrix.entry.slug }})
    needs: expand-libs
    runs-on: ubuntu-latest
    # Per-slot failures are masked; the report job's 0% hit-rate guard
    # is the sole workflow gate (#163).
    continue-on-error: true
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        entry: ${{ fromJSON(needs.expand-libs.outputs.libs) }}
    steps:
      - uses: actions/checkout@v6
      - name: Touch artifact cache
        id: touch
        # Mirror of scrape-pack.yml's per-lib cache key — drift breaks
        # the keepalive (different key = different cache entry = no
        # refresh, LRU evicts the live entry instead). Per-entry hash
        # since #153.
        uses: actions/cache/restore@v5
        with:
          path: artifacts/${{ matrix.entry.slug }}
          key: artifact-${{ matrix.entry.slug }}-${{ matrix.entry.version }}-${{ matrix.entry.cache_hash }}-${{ hashFiles('internal/embed/hugot.go') }}
      - name: Record hit/miss
        # Per-slot summary row — satisfies the per-slot markdown
        # requirement from #128. The aggregated table + totals live in
        # the downstream `report` job.
        shell: bash
        run: |
          set -euo pipefail
          status="miss"
          if [ "${{ steps.touch.outputs.cache-hit }}" = "true" ]; then
            status="hit"
          fi
          {
            echo "### cache-keepalive — \`${{ matrix.entry.lib_id }}\` @ \`${{ matrix.entry.version }}\`"
            echo ""
            echo "| lib | version | status |"
            echo "| --- | --- | --- |"
            echo "| \`${{ matrix.entry.lib_id }}\` | \`${{ matrix.entry.version }}\` | $status |"
          } >> "$GITHUB_STEP_SUMMARY"

  report:
    name: report
    needs: [expand-libs, refresh]
    # Render the aggregated summary even if some refresh slots errored
    # on transient runner issues — expand-libs must have succeeded
    # though, since without its JSON there is no lib list to report on.
    if: always() && needs.expand-libs.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Read-only scope, additive to the workflow default. Required for
      # `gh api /repos/:owner/:repo/actions/caches` which derives the
      # post-run hit/miss view. No writes.
      actions: read
    steps:
      - name: Aggregate hit/miss
        env:
          LIBS_JSON: ${{ needs.expand-libs.outputs.libs }}
          EMBEDDER_HASH: ${{ needs.expand-libs.outputs.embedder_hash }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          # Enumerate current artifact-* cache keys. A lib's key appears
          # in this list iff its cache existed at refresh time (the
          # restore step updated its last_accessed_at) — i.e. a hit.
          # Absent key ⇒ miss (nothing to refresh; next scrape-pack
          # dispatch will fully rescrape the lib). This is the honest
          # post-run signal; per-slot summaries have the authoritative
          # cache-hit output from actions/cache/restore itself.
          # Fail loudly on API failure rather than swallowing it: an
          # empty `caches` would otherwise produce an all-miss summary
          # and trip the 0% hit-rate guard below with a misleading
          # cache-key-drift message (#163).
          if ! caches="$(gh api --paginate "/repos/$GH_REPO/actions/caches?per_page=100" --jq '.actions_caches[].key')"; then
            echo "::error::cache-keepalive: gh api caches lookup failed — cannot compute hit-rate"
            exit 1
          fi
          hit=0; miss=0
          {
            echo "## cache-keepalive summary"
            echo ""
            echo "| lib | version | status |"
            echo "| --- | --- | --- |"
          } >> "$GITHUB_STEP_SUMMARY"
          # cache_hash comes from the per-entry JSON (#153) — must match
          # exactly what scrape-pack.yml's cache step writes, otherwise
          # this job reports phantom misses on entries that are actually
          # alive in the cache.
          while IFS=$'\t' read -r lib_id version slug cache_hash; do
            expected="artifact-${slug}-${version}-${cache_hash}-${EMBEDDER_HASH}"
            if printf '%s\n' "$caches" | grep -Fxq -- "$expected"; then
              status="hit"; hit=$((hit + 1))
            else
              status="miss"; miss=$((miss + 1))
            fi
            echo "| \`$lib_id\` | \`$version\` | $status |" >> "$GITHUB_STEP_SUMMARY"
          done < <(printf '%s' "$LIBS_JSON" | jq -r '.[] | [.lib_id, .version, .slug, .cache_hash] | @tsv')
          {
            echo ""
            echo "**Totals:** $hit hit, $miss miss"
            echo ""
            echo "_A \`miss\` is not a failure — the lib's cache has aged out (or never existed) and will be fully rescraped on the next \`scrape-pack\` operator dispatch._"
          } >> "$GITHUB_STEP_SUMMARY"

          # 0% hit-rate guard (#163): a single hit proves the keepalive
          # plumbing works, so the threshold is exact-zero rather than
          # "<50%". Protects against #153-class cache key drift where
          # every slot silently misses and the workflow used to report
          # success despite refreshing nothing.
          total=$((hit + miss))
          if [ "$total" -eq 0 ]; then
            echo "::error::cache-keepalive: matrix expansion produced 0 entries — check expand-libs"
            exit 1
          fi
          if [ "$hit" -eq 0 ]; then
            echo "::error::cache-keepalive: 0/$total slots hit — cache key drift suspected (see #153 for past pattern)"
            exit 1
          fi
