name: Release

# Triggered by a tag push like `git tag v0.1.0-rc1 && git push --tags`.
# Builds the four deadzone CLIs natively on one runner per target,
# uploads per-platform tarballs as build artifacts, then aggregates
# them into a GitHub Release with a sha256 checksums file.
#
# Native runners (no cross-compile) because the hugot ORT backend
# requires CGO_ENABLED=1 and a matching libtokenizers.a — see #70 for
# the full comparison against goreleaser-cross / Zig CC.
on:
  push:
    tags: ['v*']
  # Manual trigger for dry-run testing on a branch. The matrix still
  # runs, but the aggregation job skips `gh release create` because
  # there is no tag to attach assets to.
  workflow_dispatch:

# TOKENIZERS_VERSION is the daulet/tokenizers release tag; bumping is
# a conscious step — the composite action keys its cache on this file
# so a bump invalidates cached archives on all three runners.
env:
  TOKENIZERS_VERSION: v1.26.0

jobs:
  build:
    name: build (${{ matrix.goos }}/${{ matrix.goarch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            goos: darwin
            goarch: arm64
          - runner: ubuntu-24.04
            goos: linux
            goarch: amd64
          # GitHub's free public arm64 label is `ubuntu-24.04-arm`
          # (not `-arm64` as the issue body suggests).
          - runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      # mise supplies the Go + just versions pinned in .mise.toml, so
      # CI builds with the same toolchain as a dev laptop running
      # `just build-release`.
      - uses: jdx/mise-action@v2

      - name: Install native deps
        uses: ./.github/actions/install-native-deps

      - name: Resolve version metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          # On a tag push github.ref_name is the tag (v0.1.0); on
          # workflow_dispatch it is the branch name, which we fall
          # back to `git describe` to keep the binary self-labelling.
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            version="$GITHUB_REF_NAME"
          else
            version="$(git describe --tags --dirty --always)"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      # `just build-release` wires VERSION/COMMIT/DATE into ldflags and
      # passes -trimpath + -s -w. Keeping the build logic in the
      # justfile (not inlined here) is deliberate — so the local
      # `just build-release` on a dev laptop produces byte-identical
      # flags to CI.
      - name: Build binaries
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          COMMIT: ${{ github.sha }}
          DATE: ${{ steps.meta.outputs.date }}
          DEADZONE_TOKENIZERS_LIB: /tmp/deadzone-deps/tokenizers
        run: just build-release

      # Smoke test: the -version flag short-circuits embedder and DB
      # load, so it runs on any machine without a model cache. This
      # also proves ldflags injection actually landed.
      - name: Smoke test -version
        run: |
          ./deadzone-server -version
          ./deadzone-scraper -version
          ./deadzone-consolidate -version
          ./deadzone-packs -version

      - name: Package archive
        id: pkg
        shell: bash
        run: |
          set -euo pipefail
          name="deadzone_${{ steps.meta.outputs.version }}_${{ matrix.goos }}_${{ matrix.goarch }}"
          mkdir "${name}"
          cp deadzone-server deadzone-scraper deadzone-consolidate deadzone-packs "${name}/"
          cp LICENSE NOTICE README.md "${name}/"
          tar -czf "${name}.tar.gz" "${name}"
          echo "archive=${name}.tar.gz" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: deadzone-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ steps.pkg.outputs.archive }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-24.04
    # The job itself runs for both tag pushes and workflow_dispatch so
    # the dry-run path can validate the prebuilt-DB pipeline on a
    # branch. Only the final `gh release create` step is gated on an
    # actual tag push — see #90.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          pattern: deadzone-*
          merge-multiple: true
          path: dist

      - name: Resolve version metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          # Mirror the build job: tag push → tag name, dispatch → git describe.
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            version="$GITHUB_REF_NAME"
          else
            version="$(git describe --tags --dirty --always)"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Extract linux_amd64 tarball for bundled tools
        shell: bash
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          tar -xzf "dist/deadzone_${VERSION}_linux_amd64.tar.gz" -C /tmp
          # Put deadzone-packs + deadzone-consolidate on PATH for the next steps.
          echo "/tmp/deadzone_${VERSION}_linux_amd64" >> "$GITHUB_PATH"

      - name: Build consolidated deadzone.db from rolling packs release
        env:
          # `deadzone-packs download` shells out to `gh release download`,
          # which needs an auth token on ubuntu-24.04 runners.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Keep hugot's first-run model download inside the job workspace;
          # second-run cache reuse is irrelevant for a single-shot CI job.
          DEADZONE_HUGOT_CACHE: /tmp/deadzone-models
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts "$DEADZONE_HUGOT_CACHE"
          # artifacts/manifest.yaml is committed in the repo; it names every
          # per-lib .db asset on the rolling `packs` release. The operator
          # runs `deadzone-packs upload` locally before tagging.
          deadzone-packs download
          deadzone-consolidate
          ls -l deadzone.db
          # Move into dist/ so the checksums + release upload steps see it
          # alongside the per-platform tarballs.
          mv deadzone.db dist/

      - name: Compute checksums (tarballs + deadzone.db)
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          # Single checksums.txt covers every release asset — users who want
          # to verify more than the DB hit one file, one command.
          sha256sum deadzone_*.tar.gz deadzone.db > "deadzone_${VERSION}_checksums.txt"
          # Standalone deadzone.db.sha256 for the one-curl UX in the README,
          # so `sha256sum -c deadzone.db.sha256` Just Works without parsing
          # the aggregated checksums file.
          sha256sum deadzone.db > deadzone.db.sha256
          cat "deadzone_${VERSION}_checksums.txt"

      - name: Upload deadzone.db as workflow artifact (dry-run visibility)
        uses: actions/upload-artifact@v4
        with:
          name: deadzone-db
          path: |
            dist/deadzone.db
            dist/deadzone.db.sha256
          if-no-files-found: error
          retention-days: 7

      - name: Create GitHub release
        # Tag-push only; workflow_dispatch stops after the artifact upload.
        if: github.event_name == 'push' && github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.meta.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "$VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$VERSION" \
            --generate-notes \
            dist/deadzone_*.tar.gz \
            "dist/deadzone_${VERSION}_checksums.txt" \
            dist/deadzone.db \
            dist/deadzone.db.sha256
