name: Release

# Triggered by a tag push like `git tag v0.1.0-rc1 && git push --tags`.
# Builds the single `deadzone` CLI natively on one runner per target,
# uploads per-platform tarballs as build artifacts, then aggregates
# them into a GitHub Release with a sha256 checksums file. Each tarball
# contains one binary (`deadzone`) plus `LICENSE`, `NOTICE`, `README.md`.
#
# As of #101 the release job publishes **tarballs only** — the
# consolidated `deadzone.db` is shipped out-of-band by the operator
# running `deadzone dbrelease <tag>` from their laptop. See
# docs/research/ingestion-architecture.md (decision 5, v2) for the
# rationale; the per-artifact `packs download` + `consolidate` flow is
# paused and will return when CI takes over distribution at scale.
#
# Native runners (no cross-compile) because the hugot ORT backend
# requires CGO_ENABLED=1 and a matching libtokenizers.a — see #70 for
# the full comparison against goreleaser-cross / Zig CC.
on:
  push:
    tags: ['v*']
  # Manual trigger for dry-run testing on a branch. The matrix still
  # runs, but the aggregation job skips `gh release create` because
  # there is no tag to attach assets to.
  workflow_dispatch:

# Serialize releases on the same ref so two concurrent runs (tag push
# racing a manual workflow_dispatch on the same tag, or two near-
# simultaneous tag pushes) don't upload artifacts to the same GH
# Release in parallel. Group key includes github.ref so different
# tags don't queue behind each other unnecessarily.
#
# cancel-in-progress: false because aborting a half-uploaded release
# is strictly worse than serializing — a killed run leaves a partial
# Release on GitHub (some assets present, others missing), and the
# replacement run has no clean signal to detect/repair that state.
# Queueing waits, but the eventual state is consistent. See #157.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# Pinned tokenizers release lives in
# .github/actions/install-native-deps/action.yml as the
# `tokenizers-version` input default — single source of truth (#158).

jobs:
  build:
    name: build (${{ matrix.goos }}/${{ matrix.goarch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            goos: darwin
            goarch: arm64
          - runner: ubuntu-24.04
            goos: linux
            goarch: amd64
          # GitHub's free public arm64 label is `ubuntu-24.04-arm`
          # (not `-arm64` as the issue body suggests).
          - runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      # mise supplies the Go + just versions pinned in .mise.toml, so
      # CI builds with the same toolchain as a dev laptop running
      # `just build-release`.
      - uses: jdx/mise-action@v4

      - name: Install native deps
        uses: ./.github/actions/install-native-deps

      - name: Resolve version metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          # On a tag push github.ref_name is the tag (v0.1.0); on
          # workflow_dispatch it is the branch name, which we fall
          # back to `git describe` to keep the binary self-labelling.
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            version="$GITHUB_REF_NAME"
          else
            version="$(git describe --tags --dirty --always)"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      # `just build-release` wires VERSION/COMMIT/DATE into ldflags and
      # passes -trimpath + -s -w. Keeping the build logic in the
      # justfile (not inlined here) is deliberate — so the local
      # `just build-release` on a dev laptop produces byte-identical
      # flags to CI.
      - name: Build binaries
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          COMMIT: ${{ github.sha }}
          DATE: ${{ steps.meta.outputs.date }}
          DEADZONE_TOKENIZERS_LIB: /tmp/deadzone-deps/tokenizers
        run: just build-release

      # Smoke test: the --version flag short-circuits embedder and DB
      # load, so it runs on any machine without a model cache. This
      # also proves ldflags injection actually landed.
      - name: Smoke test --version
        run: ./deadzone --version

      - name: Package archive
        id: pkg
        shell: bash
        run: |
          set -euo pipefail
          name="deadzone_${{ steps.meta.outputs.version }}_${{ matrix.goos }}_${{ matrix.goarch }}"
          mkdir "${name}"
          cp deadzone "${name}/"
          cp LICENSE NOTICE README.md "${name}/"
          tar -czf "${name}.tar.gz" "${name}"
          echo "archive=${name}.tar.gz" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v7
        with:
          name: deadzone-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ steps.pkg.outputs.archive }}
          if-no-files-found: error
          retention-days: 7

  # Clean-runner smoke test — re-downloads each platform's tarball onto a
  # fresh runner with no source checkout, no Go toolchain, no libtokenizers,
  # no model cache. Catches runtime issues the inline build-runner smoke
  # (step "Smoke test --version" above) can't see because that runner carries
  # every build-time dep on PATH already:
  #   - `@rpath` references that point at a build-host-local directory
  #   - libonnxruntime auto-download (#73) failing on a truly fresh machine
  #   - missing runtime libs (libstdc++ / libgcc variant) on a stock runner
  #   - GOOS/GOARCH matrix mismatches that only surface at exec time
  # A failure here blocks `release` via the needs: chain below.
  smoke:
    name: smoke (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            goos: darwin
            goarch: arm64
          - runner: ubuntu-24.04
            goos: linux
            goarch: amd64
          - runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
    runs-on: ${{ matrix.runner }}
    # 2-minute ceiling per runner matches #78's AC — if ORT bootstrap or
    # a `--version` call takes longer than this, something is wrong and
    # we want the job to fail loudly rather than hang the release.
    timeout-minutes: 2
    steps:
      # Deliberately no actions/checkout — the whole point of this job is
      # to prove the tarball works without any project files on disk.
      - uses: actions/download-artifact@v8
        with:
          name: deadzone-${{ matrix.goos }}-${{ matrix.goarch }}

      - name: Extract tarball
        shell: bash
        run: |
          set -euo pipefail
          # Exactly one tarball lands here (download-artifact by name).
          tar -xzf deadzone_*_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz
          ls -l deadzone_*_${{ matrix.goos }}_${{ matrix.goarch }}/

      - name: Verify binary launches (--version)
        shell: bash
        run: |
          set -euo pipefail
          cd deadzone_*_${{ matrix.goos }}_${{ matrix.goarch }}
          # --version short-circuits before embedder/DB load, so this
          # runs with no model cache and no DB on disk. It proves:
          # dylib linkage resolves, @rpath is clean, ldflags injected a
          # real version string, and the binary actually boots on a
          # machine that never saw the build toolchain.
          ./deadzone --version

      - name: Exercise ORT bootstrap (#73)
        shell: bash
        run: |
          set -euo pipefail
          cd deadzone_*_${{ matrix.goos }}_${{ matrix.goarch }}
          # `deadzone consolidate` loads the hugot embedder before it
          # checks the artifacts dir (see cmd/deadzone/consolidate.go),
          # so pointing it at an empty dir triggers the full ORT
          # auto-download + libtokenizers + libonnxruntime bootstrap,
          # then exits 0 with zero artifacts merged. This is the only
          # smoke path that proves #73's fresh-machine download works
          # on each target platform's real ORT asset URL.
          mkdir -p empty-artifacts
          ./deadzone consolidate \
            --artifacts ./empty-artifacts \
            --db /tmp/deadzone-smoke.db

  # Repackages each Linux tarball into an AppImage via the
  # .github/actions/build-appimage composite. Runs after `smoke` so a
  # broken tarball can't silently produce a broken AppImage (the tarball
  # smoke is the cheaper canary). AppImage smoke (FUSE mount + ORT
  # bootstrap) is inlined at the end of this job because the runner
  # already has the AppImage on disk and libfuse2 installed via the
  # composite — no sense adding a fourth job for two extra steps.
  # Aggregation happens in `release` below, which globs `deadzone-*`
  # artifacts; the `-appimage` suffix keeps AppImage and tarball
  # artifacts from colliding on upload-artifact names.
  appimage:
    name: appimage (linux/${{ matrix.goarch }})
    needs: smoke
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            goarch: amd64
          - runner: ubuntu-24.04-arm
            goarch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: deadzone-linux-${{ matrix.goarch }}

      - name: Build AppImage
        id: build
        uses: ./.github/actions/build-appimage
        with:
          tarball: deadzone_*_linux_${{ matrix.goarch }}.tar.gz
          arch: ${{ matrix.goarch }}

      # Mirrors the tarball smoke's contract (see the `smoke` job
      # above): --version proves the AppImage launches and dylib linkage
      # resolves inside the SquashFS mount, then `consolidate` with an
      # empty artifacts dir exercises the ORT bootstrap (#73) from a
      # read-only payload into $XDG_CACHE_HOME. If AppRun's
      # DEADZONE_ORT_CACHE override regresses, this step is where it
      # surfaces — the bootstrap would try to write inside the mount
      # and fail.
      - name: Smoke AppImage --version
        shell: bash
        run: |
          set -euo pipefail
          chmod +x "${{ steps.build.outputs.appimage }}"
          "./${{ steps.build.outputs.appimage }}" --version

      - name: Smoke AppImage consolidate (ORT bootstrap)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p empty-artifacts
          "./${{ steps.build.outputs.appimage }}" consolidate \
            --artifacts ./empty-artifacts \
            --db /tmp/deadzone-appimage-smoke.db

      - uses: actions/upload-artifact@v7
        with:
          name: deadzone-linux-${{ matrix.goarch }}-appimage
          path: ${{ steps.build.outputs.appimage }}
          if-no-files-found: error
          retention-days: 7

  # Multi-arch OCI image published to GHCR alongside the existing tarball
  # / AppImage / Homebrew artifacts (#196). Strictly additive — the
  # tarball + AppImage paths still ship as today; this job adds a third
  # install path documented in README.
  #
  # The Dockerfile does no compilation; the per-arch binaries from the
  # `build` matrix are downloaded as artifacts and COPYd in. libonnxruntime
  # is fetched at job time using `./deadzone ort-meta` to read the pinned
  # URL/SHA from the binary's own constants (internal/ort.pinnedReleases) —
  # no parallel YAML copy that could drift on a future ORT bump.
  #
  # `needs: smoke` means: only image binaries that already proved they
  # launch on a clean runner. `release` (below) gains a `needs: docker`
  # entry so the Release object isn't published until the OCI push has
  # succeeded — a tag landing without its image is the failure mode we
  # explicitly avoid.
  docker:
    name: docker (ghcr.io)
    needs: smoke
    runs-on: ubuntu-24.04
    # `packages: write` is required for the GHCR push via GITHUB_TOKEN.
    # `contents: read` is the default; making it explicit signals that
    # this job reads source (the Dockerfile + actions) and nothing else.
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          pattern: deadzone-linux-*
          merge-multiple: true
          path: dist-tarballs

      - name: Resolve version metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          # Mirror the build/release jobs: tag push → tag name, dispatch → git describe.
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            version="$GITHUB_REF_NAME"
          else
            version="$(git describe --tags --dirty --always)"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      # Lay out dist/linux_<arch>/{deadzone, lib/} for both arches so
      # the Dockerfile's COPY dist/linux_${TARGETARCH}/... finds what it
      # expects under each buildx platform. The amd64 binary runs on
      # the runner directly to call ./deadzone ort-meta — single source
      # of truth for the ORT URL/SHA per arch.
      - name: Stage build context
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          for arch in amd64 arm64; do
            tar -xzf "dist-tarballs/deadzone_${VERSION}_linux_${arch}.tar.gz" -C /tmp
            mkdir -p "dist/linux_${arch}/lib"
            mv "/tmp/deadzone_${VERSION}_linux_${arch}/deadzone" "dist/linux_${arch}/deadzone"
            chmod +x "dist/linux_${arch}/deadzone"
          done
          # ort-meta is CGO-linked through hugot but only reads the
          # pinned-constants table — no embedder load, no network. Run
          # the amd64 binary on the amd64 runner and reuse its JSON
          # output for both arches.
          meta=$(./dist/linux_amd64/deadzone ort-meta)
          echo "${meta}"
          for arch in amd64 arm64; do
            url=$(echo "${meta}" | jq -r --arg a "${arch}" '.platforms[] | select(.goarch==$a) | .url')
            sha=$(echo "${meta}" | jq -r --arg a "${arch}" '.platforms[] | select(.goarch==$a) | .sha256')
            test -n "${url}" && test -n "${sha}" || { echo "ort-meta missing entry for linux/${arch}" >&2; exit 1; }
            tmp=$(mktemp -d)
            curl -fL -o "${tmp}/ort.tgz" "${url}"
            echo "${sha}  ${tmp}/ort.tgz" | sha256sum -c -
            tar -C "${tmp}" -xzf "${tmp}/ort.tgz"
            # Copy both the real ELF (libonnxruntime.so.<version>) and
            # the unversioned symlink alias — distroless has no
            # ldconfig so dlopen needs the file present under the
            # exact name hugot's WithOnnxLibraryPath asks for.
            find "${tmp}" -maxdepth 4 \( -type f -o -type l \) -name 'libonnxruntime.so*' -exec cp -P {} "dist/linux_${arch}/lib/" \;
            ls -l "dist/linux_${arch}/lib/"
            rm -rf "${tmp}"
          done

      # QEMU is needed for the runtime smoke (`docker run --platform
      # linux/arm64 …` on an amd64 runner). The buildx build itself
      # doesn't need it — the Dockerfile only does COPY, no RUN.
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Compute the lowercased image ref so the `latest` and `<tag>`
      # tags are valid (GHCR rejects mixed-case repo paths). github.repository
      # carries the canonical owner/name, which may include capitals.
      - name: Compute image ref
        id: img
        shell: bash
        run: |
          set -euo pipefail
          ref="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          echo "ref=${ref}" >> "$GITHUB_OUTPUT"

      # On a tag push: publish to ghcr with both <tag> and :latest. On
      # workflow_dispatch (dry-run): build the multi-arch manifest in
      # the buildx cache without --push so the staging steps and
      # Dockerfile validity are exercised end-to-end without touching
      # the registry. Smoke steps below skip when the image isn't
      # pushed because docker run can't reach a buildx-cached image
      # by reference.
      - name: Build + push multi-arch image
        id: build_push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' && github.ref_type == 'tag' }}
          tags: |
            ${{ steps.img.outputs.ref }}:${{ steps.meta.outputs.version }}
            ${{ steps.img.outputs.ref }}:latest
          labels: |
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}

      # Two --version smoke steps, one per arch. --network none because
      # the --version path short-circuits before any embedder or DB load
      # — the only thing this validates is that the binary launches
      # inside the distroless rootfs (GLIBC compat + dlopen of
      # libonnxruntime + ldflags injection).
      #
      # We deliberately do NOT run a `server` smoke here even though it
      # would exercise the end-to-end MCP handshake. Reason: the docker
      # job runs BEFORE the `release` job creates the GitHub Release
      # object, so the binary's `internal/db.Bootstrap` would fail to
      # fetch deadzone.db from the just-tagged release ("no
      # deadzone.db published for this binary version"). That smoke is
      # structurally impossible at this point in the pipeline; the
      # native binary's `smoke` job already validates the bootstrap
      # logic against a previously-published release. End-to-end
      # validation of the new image happens manually after the operator
      # uploads deadzone.db (just dbrelease <tag> or scrape-pack.yml
      # with non-empty tag).
      #
      # Skipped on dry-run dispatch because the image isn't pushed and
      # docker run can't address a buildx-only build by name.
      - name: Smoke amd64 --version (offline)
        if: github.event_name == 'push' && github.ref_type == 'tag'
        run: docker run --rm --platform linux/amd64 --network none ${{ steps.img.outputs.ref }}:${{ steps.meta.outputs.version }} --version

      - name: Smoke arm64 --version (offline)
        if: github.event_name == 'push' && github.ref_type == 'tag'
        run: docker run --rm --platform linux/arm64 --network none ${{ steps.img.outputs.ref }}:${{ steps.meta.outputs.version }} --version

  release:
    name: publish release
    needs: [build, smoke, appimage, docker]
    runs-on: ubuntu-24.04
    # The job runs for both tag pushes and workflow_dispatch so the
    # dry-run path can validate the tarball aggregation on a branch.
    # Only the final `gh release create` step is gated on an actual
    # tag push — see #90.
    permissions:
      contents: write
    steps:
      # Fail fast: a missing/rotated PAT otherwise surfaces as a 401
      # deep in `gh release create`. Gated like the publish step so
      # dry-run dispatches skip it. See #161.
      - name: Validate secrets
        if: github.event_name == 'push' && github.ref_type == 'tag'
        env:
          RELEASE_PUBLISH_TOKEN: ${{ secrets.RELEASE_PUBLISH_TOKEN }}
        run: |
          if [ -z "$RELEASE_PUBLISH_TOKEN" ]; then
            echo "::error::RELEASE_PUBLISH_TOKEN missing or empty — required PAT (Contents: read+write on this repo) so release.published spawns update-package-channels.yml. See repo settings → secrets and #161."
            exit 1
          fi

      - uses: actions/download-artifact@v8
        with:
          pattern: deadzone-*
          merge-multiple: true
          path: dist

      - name: Resolve version metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          # Mirror the build job: tag push → tag name, dispatch → git describe.
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            version="$GITHUB_REF_NAME"
          else
            version="$(git describe --tags --dirty --always)"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Compute tarball checksums
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          # Single checksums.txt covers every per-platform tarball and
          # AppImage — users who want to verify hit one file, one
          # command. The consolidated `deadzone.db` is uploaded
          # separately by `deadzone dbrelease` from the operator's
          # laptop after this job finishes (see #101 §H); its sha256
          # lives in a sibling `deadzone.db.sha256` asset written by
          # that subcommand.
          sha256sum deadzone_*.tar.gz deadzone_*.AppImage \
            > "deadzone_${VERSION}_checksums.txt"
          cat "deadzone_${VERSION}_checksums.txt"

      - name: Create GitHub release
        # Tag-push only; workflow_dispatch stops after the checksums step.
        if: github.event_name == 'push' && github.ref_type == 'tag'
        # Fine-grained PAT (Contents: Read and write, this repo only) so the
        # `release.published` event spawns downstream workflows. The default
        # GITHUB_TOKEN is anti-recursion-gated and would not fire
        # update-package-channels.yml — see #130.
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PUBLISH_TOKEN }}
          VERSION: ${{ steps.meta.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "$VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$VERSION" \
            --generate-notes \
            dist/deadzone_*.tar.gz \
            dist/deadzone_*.AppImage \
            "dist/deadzone_${VERSION}_checksums.txt"
