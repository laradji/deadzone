name: Release

# Triggered by a tag push like `git tag v0.1.0-rc1 && git push --tags`.
# Builds the single `deadzone` CLI natively on one runner per target,
# uploads per-platform tarballs as build artifacts, then aggregates
# them into a GitHub Release with a sha256 checksums file. Each tarball
# contains one binary (`deadzone`) plus `LICENSE`, `NOTICE`, `README.md`.
#
# As of #101 the release job publishes **tarballs only** — the
# consolidated `deadzone.db` is shipped out-of-band by the operator
# running `deadzone dbrelease <tag>` from their laptop. See
# docs/research/ingestion-architecture.md (decision 5, v2) for the
# rationale; the per-artifact `packs download` + `consolidate` flow is
# paused and will return when CI takes over distribution at scale.
#
# Native runners (no cross-compile) because the hugot ORT backend
# requires CGO_ENABLED=1 and a matching libtokenizers.a — see #70 for
# the full comparison against goreleaser-cross / Zig CC.
on:
  push:
    tags: ['v*']
  # Manual trigger for dry-run testing on a branch. The matrix still
  # runs, but the aggregation job skips `gh release create` because
  # there is no tag to attach assets to.
  workflow_dispatch:

# TOKENIZERS_VERSION is the daulet/tokenizers release tag; bumping is
# a conscious step — the composite action keys its cache on this file
# so a bump invalidates cached archives on all three runners.
env:
  TOKENIZERS_VERSION: v1.26.0

jobs:
  build:
    name: build (${{ matrix.goos }}/${{ matrix.goarch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            goos: darwin
            goarch: arm64
          - runner: ubuntu-24.04
            goos: linux
            goarch: amd64
          # GitHub's free public arm64 label is `ubuntu-24.04-arm`
          # (not `-arm64` as the issue body suggests).
          - runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      # mise supplies the Go + just versions pinned in .mise.toml, so
      # CI builds with the same toolchain as a dev laptop running
      # `just build-release`.
      - uses: jdx/mise-action@v4

      - name: Install native deps
        uses: ./.github/actions/install-native-deps

      - name: Resolve version metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          # On a tag push github.ref_name is the tag (v0.1.0); on
          # workflow_dispatch it is the branch name, which we fall
          # back to `git describe` to keep the binary self-labelling.
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            version="$GITHUB_REF_NAME"
          else
            version="$(git describe --tags --dirty --always)"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      # `just build-release` wires VERSION/COMMIT/DATE into ldflags and
      # passes -trimpath + -s -w. Keeping the build logic in the
      # justfile (not inlined here) is deliberate — so the local
      # `just build-release` on a dev laptop produces byte-identical
      # flags to CI.
      - name: Build binaries
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          COMMIT: ${{ github.sha }}
          DATE: ${{ steps.meta.outputs.date }}
          DEADZONE_TOKENIZERS_LIB: /tmp/deadzone-deps/tokenizers
        run: just build-release

      # Smoke test: the --version flag short-circuits embedder and DB
      # load, so it runs on any machine without a model cache. This
      # also proves ldflags injection actually landed.
      - name: Smoke test --version
        run: ./deadzone --version

      - name: Package archive
        id: pkg
        shell: bash
        run: |
          set -euo pipefail
          name="deadzone_${{ steps.meta.outputs.version }}_${{ matrix.goos }}_${{ matrix.goarch }}"
          mkdir "${name}"
          cp deadzone "${name}/"
          cp LICENSE NOTICE README.md "${name}/"
          tar -czf "${name}.tar.gz" "${name}"
          echo "archive=${name}.tar.gz" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v7
        with:
          name: deadzone-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ steps.pkg.outputs.archive }}
          if-no-files-found: error
          retention-days: 7

  # Clean-runner smoke test — re-downloads each platform's tarball onto a
  # fresh runner with no source checkout, no Go toolchain, no libtokenizers,
  # no model cache. Catches runtime issues the inline build-runner smoke
  # (step "Smoke test --version" above) can't see because that runner carries
  # every build-time dep on PATH already:
  #   - `@rpath` references that point at a build-host-local directory
  #   - libonnxruntime auto-download (#73) failing on a truly fresh machine
  #   - missing runtime libs (libstdc++ / libgcc variant) on a stock runner
  #   - GOOS/GOARCH matrix mismatches that only surface at exec time
  # A failure here blocks `release` via the needs: chain below.
  smoke:
    name: smoke (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            goos: darwin
            goarch: arm64
          - runner: ubuntu-24.04
            goos: linux
            goarch: amd64
          - runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
    runs-on: ${{ matrix.runner }}
    # 2-minute ceiling per runner matches #78's AC — if ORT bootstrap or
    # a `--version` call takes longer than this, something is wrong and
    # we want the job to fail loudly rather than hang the release.
    timeout-minutes: 2
    steps:
      # Deliberately no actions/checkout — the whole point of this job is
      # to prove the tarball works without any project files on disk.
      - uses: actions/download-artifact@v8
        with:
          name: deadzone-${{ matrix.goos }}-${{ matrix.goarch }}

      - name: Extract tarball
        shell: bash
        run: |
          set -euo pipefail
          # Exactly one tarball lands here (download-artifact by name).
          tar -xzf deadzone_*_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz
          ls -l deadzone_*_${{ matrix.goos }}_${{ matrix.goarch }}/

      - name: Verify binary launches (--version)
        shell: bash
        run: |
          set -euo pipefail
          cd deadzone_*_${{ matrix.goos }}_${{ matrix.goarch }}
          # --version short-circuits before embedder/DB load, so this
          # runs with no model cache and no DB on disk. It proves:
          # dylib linkage resolves, @rpath is clean, ldflags injected a
          # real version string, and the binary actually boots on a
          # machine that never saw the build toolchain.
          ./deadzone --version

      - name: Exercise ORT bootstrap (#73)
        shell: bash
        run: |
          set -euo pipefail
          cd deadzone_*_${{ matrix.goos }}_${{ matrix.goarch }}
          # `deadzone consolidate` loads the hugot embedder before it
          # checks the artifacts dir (see cmd/deadzone/consolidate.go),
          # so pointing it at an empty dir triggers the full ORT
          # auto-download + libtokenizers + libonnxruntime bootstrap,
          # then exits 0 with zero artifacts merged. This is the only
          # smoke path that proves #73's fresh-machine download works
          # on each target platform's real ORT asset URL.
          mkdir -p empty-artifacts
          ./deadzone consolidate \
            --artifacts ./empty-artifacts \
            --db /tmp/deadzone-smoke.db

  # Repackages each Linux tarball into an AppImage via the
  # .github/actions/build-appimage composite. Runs after `smoke` so a
  # broken tarball can't silently produce a broken AppImage (the tarball
  # smoke is the cheaper canary). AppImage smoke (FUSE mount + ORT
  # bootstrap) is inlined at the end of this job because the runner
  # already has the AppImage on disk and libfuse2 installed via the
  # composite — no sense adding a fourth job for two extra steps.
  # Aggregation happens in `release` below, which globs `deadzone-*`
  # artifacts; the `-appimage` suffix keeps AppImage and tarball
  # artifacts from colliding on upload-artifact names.
  appimage:
    name: appimage (linux/${{ matrix.goarch }})
    needs: smoke
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            goarch: amd64
          - runner: ubuntu-24.04-arm
            goarch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: deadzone-linux-${{ matrix.goarch }}

      - name: Build AppImage
        id: build
        uses: ./.github/actions/build-appimage
        with:
          tarball: deadzone_*_linux_${{ matrix.goarch }}.tar.gz
          arch: ${{ matrix.goarch }}

      # Mirrors the tarball smoke's contract (see the `smoke` job
      # above): --version proves the AppImage launches and dylib linkage
      # resolves inside the SquashFS mount, then `consolidate` with an
      # empty artifacts dir exercises the ORT bootstrap (#73) from a
      # read-only payload into $XDG_CACHE_HOME. If AppRun's
      # DEADZONE_ORT_CACHE override regresses, this step is where it
      # surfaces — the bootstrap would try to write inside the mount
      # and fail.
      - name: Smoke AppImage --version
        shell: bash
        run: |
          set -euo pipefail
          chmod +x "${{ steps.build.outputs.appimage }}"
          "./${{ steps.build.outputs.appimage }}" --version

      - name: Smoke AppImage consolidate (ORT bootstrap)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p empty-artifacts
          "./${{ steps.build.outputs.appimage }}" consolidate \
            --artifacts ./empty-artifacts \
            --db /tmp/deadzone-appimage-smoke.db

      - uses: actions/upload-artifact@v7
        with:
          name: deadzone-linux-${{ matrix.goarch }}-appimage
          path: ${{ steps.build.outputs.appimage }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: publish release
    needs: [build, smoke, appimage]
    runs-on: ubuntu-24.04
    # The job runs for both tag pushes and workflow_dispatch so the
    # dry-run path can validate the tarball aggregation on a branch.
    # Only the final `gh release create` step is gated on an actual
    # tag push — see #90.
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: deadzone-*
          merge-multiple: true
          path: dist

      - name: Resolve version metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          # Mirror the build job: tag push → tag name, dispatch → git describe.
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            version="$GITHUB_REF_NAME"
          else
            version="$(git describe --tags --dirty --always)"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Compute tarball checksums
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          # Single checksums.txt covers every per-platform tarball and
          # AppImage — users who want to verify hit one file, one
          # command. The consolidated `deadzone.db` is uploaded
          # separately by `deadzone dbrelease` from the operator's
          # laptop after this job finishes (see #101 §H); its sha256
          # lives in a sibling `deadzone.db.sha256` asset written by
          # that subcommand.
          sha256sum deadzone_*.tar.gz deadzone_*.AppImage \
            > "deadzone_${VERSION}_checksums.txt"
          cat "deadzone_${VERSION}_checksums.txt"

      - name: Create GitHub release
        # Tag-push only; workflow_dispatch stops after the checksums step.
        if: github.event_name == 'push' && github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.meta.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "$VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$VERSION" \
            --generate-notes \
            dist/deadzone_*.tar.gz \
            dist/deadzone_*.AppImage \
            "dist/deadzone_${VERSION}_checksums.txt"
