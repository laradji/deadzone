# scrape-pack — batch scrape the registry on GH-hosted runners, consolidate
# into a single deadzone.db, optionally publish via `deadzone dbrelease`.
#
# Decisions live in docs/research/batch-scrape-actions.md and #126:
#   - workflow_dispatch only (no cron until #47)
#   - per-lib artifact cache IS the freshness shim across runs
#   - inter-JOB transport in a SINGLE run uses Pattern B (upload-artifact
#     staging) because Pattern C (REST cache API) is not implementable —
#     the cache archive download URL is a runtime-signed Azure Blob link
#     that only @actions/cache's Node runtime token can negotiate, not
#     reachable from `gh api`. The cross-run freshness story still runs
#     entirely through the cache layer; upload-artifact is scratch
#     transport scoped to one dispatch.
#   - dbrelease fires only when inputs.tag is non-empty; empty tag stops
#     at the consolidated-db cache (no side effects on the releases page)
#   - docker (sibling to consolidate, #203) builds + pushes the OCI image
#     to GHCR with deadzone.db baked in. Same `inputs.tag != ''` gate as
#     dbrelease — empty-tag dispatches stop at the consolidated cache and
#     publish nothing. The job is sibling-not-inline so the manifest
#     commit step inside consolidate stays decoupled from the GHCR push;
#     a docker push failure leaves the GH-Releases manifest out of sync
#     with the image, which is recoverable by re-dispatching scrape-pack
#     on the same tag (manifest + image are both clobber-on-update).

name: scrape-pack

on:
  workflow_dispatch:
    inputs:
      lib:
        description: "Filter base lib_id (e.g. /hashicorp/terraform). Empty = every resolved lib."
        required: false
        type: string
        default: ""
      tag:
        description: "Release tag (e.g. v0.1.0). Non-empty chains `deadzone dbrelease`. Empty stops at consolidated-db cache."
        required: false
        type: string
        default: ""

permissions:
  contents: write # dbrelease writes GH Release assets when inputs.tag != ""
  packages: write # docker job pushes ghcr.io/laradji/deadzone:<tag>+:latest (#203)

concurrency:
  # Queue serially: parallel dispatches would fight over the same cache
  # keys, and dbrelease --clobbers the same asset names, so we let one
  # finish before the next starts.
  group: scrape-pack
  cancel-in-progress: false

env:
  # Pinned tokenizers release lives in
  # .github/actions/install-native-deps/action.yml as the
  # `tokenizers-version` input default — single source of truth (#158).
  DEADZONE_HUGOT_CACHE: ${{ github.workspace }}/.deadzone-cache/models
  DEADZONE_ORT_CACHE: ${{ github.workspace }}/.deadzone-cache/ort
  CGO_ENABLED: "1"
  CGO_LDFLAGS: -L/tmp/deadzone-deps/tokenizers

jobs:
  expand-libs:
    name: expand-libs
    runs-on: ubuntu-latest
    outputs:
      libs: ${{ steps.list.outputs.libs }}
      batches: ${{ steps.chunk.outputs.batches }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Install native deps
        uses: ./.github/actions/install-native-deps
      - name: Emit resolved libs as JSON
        id: list
        uses: ./.github/actions/list-libs
        with:
          lib: ${{ inputs.lib }}
      - name: Chunk libs into 256-slot batches
        id: chunk
        # GitHub Actions caps a job's matrix at 256 entries. With 261+
        # resolved libs the matrix expanded to ZERO slots silently and
        # the run failed with no scrape jobs (no error, just empty
        # consolidate). Splitting the resolved set into batches of 256
        # and dispatching ceil(N/256) reusable-workflow calls (each
        # with its own ≤256 matrix) keeps per-lib semantics intact —
        # cache key shape, artifact name, and failure isolation are all
        # preserved per slot. See scrape-batch.yml for the receiving
        # half. The 256 figure is the GitHub-side hard ceiling; do not
        # raise without confirming the limit moved.
        shell: bash
        env:
          LIBS_JSON: ${{ steps.list.outputs.libs }}
        run: |
          set -euo pipefail
          n=$(echo "$LIBS_JSON" | jq length)
          batches=$(echo "$LIBS_JSON" | jq -c '
            [
              range(0; length; 256) as $i |
              { batch_id: ($i / 256 | floor),
                libs:     .[$i:($i+256)] }
            ]
          ')
          bcount=$(echo "$batches" | jq length)
          echo "resolved $n libs → $bcount batch(es)"
          echo "$batches" | jq -r '.[] | "  batch \(.batch_id): \(.libs | length) libs"'
          echo "batches=$batches" >> "$GITHUB_OUTPUT"

  scrape:
    name: scrape (batch ${{ matrix.batch.batch_id }})
    needs: expand-libs
    strategy:
      # fail-fast: false at the BATCH level so a single batch's failure
      # doesn't cancel the others — each batch is a separate
      # reusable-workflow run with its own per-slot matrix that already
      # honors fail-fast: false internally.
      fail-fast: false
      matrix:
        batch: ${{ fromJSON(needs.expand-libs.outputs.batches) }}
    # Reusable workflow per batch. Each call dispatches its own
    # ≤256-slot matrix (one slot = one lib, identical to the
    # pre-batching shape), and uploads `scrape-pack-<slug>` artifacts
    # that the parent's `consolidate` job picks up via
    # download-artifact pattern. ceil(N/256) reusable runs total.
    uses: ./.github/workflows/scrape-batch.yml
    with:
      libs_json: ${{ toJSON(matrix.batch.libs) }}
      batch_id: ${{ matrix.batch.batch_id }}

  consolidate:
    name: consolidate
    needs: [expand-libs, scrape]
    # Run even when individual scrape slots failed — fail-fast: false on
    # the matrix is pointless if the downstream job refuses to render a
    # partial DB + summary. expand-libs must succeed though, because
    # without its JSON there is no summary to write.
    if: always() && needs.expand-libs.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Install native deps
        uses: ./.github/actions/install-native-deps
      - name: Restore hugot model cache
        uses: actions/cache@v5
        with:
          path: ${{ env.DEADZONE_HUGOT_CACHE }}
          key: hugot-model-${{ runner.os }}-${{ hashFiles('internal/embed/hugot.go') }}
          restore-keys: |
            hugot-model-${{ runner.os }}-
      - name: Restore ORT cache
        uses: actions/cache@v5
        with:
          path: ${{ env.DEADZONE_ORT_CACHE }}
          key: ort-lib-${{ runner.os }}-${{ hashFiles('internal/ort/ort.go') }}
          restore-keys: |
            ort-lib-${{ runner.os }}-
      - name: Fetch staged artifacts
        uses: actions/download-artifact@v8
        with:
          # Each scrape slot uploaded with LCA = artifacts/, so every
          # archive carries `<slug>/...` at its root. Extracting under
          # `path: artifacts/` with merge-multiple therefore rebuilds
          # `artifacts/<slug>/...` per slot without collisions — the
          # shape `deadzone consolidate --artifacts ./artifacts` expects.
          pattern: scrape-pack-*
          merge-multiple: true
          path: artifacts/
      - name: Consolidate
        run: go run -tags ORT ./cmd/deadzone consolidate --db deadzone.db --artifacts ./artifacts
      - name: Release (if tag)
        if: inputs.tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: go run -tags ORT ./cmd/deadzone dbrelease --db deadzone.db --tag "${{ inputs.tag }}"
      - name: Coverage (if tag)
        # Re-render docs/coverage.md from the just-released deadzone.db so
        # the bot commit below carries both the manifest and the coverage
        # map in one diff (#152). Runs after dbrelease so the manifest's
        # release.tag (read for the markdown header) reflects the tag we
        # just shipped, not the previous release.
        #
        # `-tags ORT` is build-only here — coverage does not load the
        # embedder at runtime — but the cmd/deadzone package transitively
        # imports embed/hugot, so omitting the tag would break the build.
        # The job already paid for libtokenizers.a + ORT cache in
        # install-native-deps for consolidate, so this step adds nothing.
        # If coverage is ever split into a dedicated lighter job, the new
        # job still needs the CGO/tokenizers chain to compile.
        if: inputs.tag != ''
        run: go run -tags ORT ./cmd/deadzone coverage --db deadzone.db --output docs/coverage.md
      - name: Commit manifest + coverage (if tag and diff)
        # dbrelease rewrites artifacts/manifest.yaml as its last action (see
        # #101 decision 5 and cmd/deadzone/dbrelease.go); the Coverage step
        # above rewrites docs/coverage.md from the same release. In the
        # laptop path the operator commits both diffs; in CI nothing does,
        # so the audit trace on `main` goes stale (#145, #152). The
        # `inputs.tag != ''` gate duplicates the Release step's gate on
        # purpose — without it, `git diff --quiet` would run on the
        # empty-tag path where neither file was rewritten, wasting a step.
        #
        # `HEAD:${{ github.ref_name }}` pushes the detached-HEAD commit back
        # to the dispatch ref (typically main) — actions/checkout@v6 leaves
        # us in detached HEAD, so `git push` alone has no upstream.
        #
        # Cross-workflow push race guard (#160 follow-up to #156): the
        # `concurrency: scrape-pack` group at the top of this file only
        # serializes scrape-pack against itself. A tag-triggered
        # release.yml run (or any future workflow that commits to the
        # default branch) can land a commit on `${{ github.ref_name }}`
        # between our checkout and our push, which would reject the push
        # as non-fast-forward and waste a full scrape run. We rebase the
        # bot commit onto the latest remote tip before pushing so the
        # parallel commit is integrated. manifest.yaml + coverage.md are
        # auto-generated and should never legitimately conflict — if the
        # rebase still fails, we abort and exit so an operator can triage
        # rather than risk a corrupted manifest from auto-resolution.
        if: inputs.tag != ''
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet artifacts/manifest.yaml docs/coverage.md; then
            echo "manifest.yaml + coverage.md unchanged — skipping commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add artifacts/manifest.yaml docs/coverage.md
          git commit -m "chore(release): update manifest for ${{ inputs.tag }}"

          git fetch origin "${{ github.ref_name }}"
          if ! git rebase "origin/${{ github.ref_name }}"; then
            git rebase --abort || true
            echo "::error::rebase onto origin/${{ github.ref_name }} failed — manifest.yaml or coverage.md conflict requires manual triage (see #160)"
            exit 1
          fi

          # Paranoia guard: if the rebase pulled in a sibling manifest
          # commit (e.g. another scrape-pack re-dispatch racing us), the
          # release.tag field on disk may now belong to that commit, not
          # ours. Refuse to push if so.
          actual_tag="$(grep -E '^[[:space:]]*tag:' artifacts/manifest.yaml | head -1 | awk '{print $2}')"
          if [ "$actual_tag" != "${{ inputs.tag }}" ]; then
            echo "::error::manifest.yaml release.tag is '$actual_tag' after rebase, expected '${{ inputs.tag }}' — refusing to push (see #160)"
            exit 1
          fi

          git push origin "HEAD:${{ github.ref_name }}"
      - name: Summary
        if: always()
        shell: bash
        env:
          LIBS_JSON: ${{ needs.expand-libs.outputs.libs }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          scraped=0; cached=0; failed=0
          {
            echo "## scrape-pack summary"
            echo ""
            if [ -n "$RELEASE_TAG" ]; then
              echo "Release tag: \`$RELEASE_TAG\`"
            else
              echo "Release tag: _(none — consolidated cache only)_"
            fi
            echo ""
            echo "| lib | version | status |"
            echo "| --- | --- | --- |"
          } >> "$GITHUB_STEP_SUMMARY"
          # jq pre-substitutes "-" for empty versions so bash's IFS=$'\t'
          # read does not collapse consecutive tabs on single-version
          # slots (whitespace IFS semantics would eat the empty field).
          while IFS=$'\t' read -r lib_id version slug; do
            status_path="artifacts/${slug}/.run_status"
            if [ -f "$status_path" ]; then
              status="$(tr -d '[:space:]' < "$status_path")"
            else
              status="failed"
            fi
            case "$status" in
              scraped) scraped=$((scraped + 1)) ;;
              cached)  cached=$((cached + 1)) ;;
              *)       status="failed"; failed=$((failed + 1)) ;;
            esac
            echo "| \`$lib_id\` | \`$version\` | $status |" >> "$GITHUB_STEP_SUMMARY"
          done < <(printf '%s' "$LIBS_JSON" | jq -r '.[] | [.lib_id, (if .version == "" then "-" else .version end), .slug] | @tsv')
          {
            echo ""
            echo "**Totals:** $scraped scraped, $cached cached, $failed failed"
          } >> "$GITHUB_STEP_SUMMARY"

  # Multi-arch OCI image with deadzone.db baked in (#203).
  #
  # Sibling to consolidate (not inline) so the GHCR push has its own
  # job-scoped permissions, a separate runner, and a separable CI status.
  # `needs: consolidate` chains us after the dbrelease step inside
  # consolidate succeeded — the GH Release for inputs.tag now carries the
  # tarballs (from release.yml's earlier run) and the just-uploaded
  # deadzone.db, both of which we pull into the build context here.
  #
  # Gated `if: inputs.tag != ''` at the JOB level (not just steps) so an
  # empty-tag dispatch — the cache-warm path from #126 — skips the entire
  # runner allocation. consolidate's manifest-commit + dbrelease steps
  # share the same gate, so they're already correlated.
  #
  # `--network none` smoke is now meaningful: with deadzone.db baked and
  # DEADZONE_DB_OFFLINE=1 set in the image, the MCP `initialize` handshake
  # exercises the full server boot path without contacting the network.
  # Pre-#203 this smoke was a `--version` short-circuit because Bootstrap
  # would have tried to fetch the DB from the very release we're pushing
  # against (chicken-and-egg).
  docker:
    name: docker (ghcr.io)
    needs: consolidate
    if: inputs.tag != ''
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Compute image ref
        id: img
        shell: bash
        run: |
          set -euo pipefail
          # GHCR rejects mixed-case repo paths; lowercase github.repository
          # so a future capitalised owner/name doesn't break the push.
          ref="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          echo "ref=${ref}" >> "$GITHUB_OUTPUT"

      # Pull both the per-arch tarballs (from release.yml's earlier run on
      # the same tag) and the just-uploaded deadzone.db (from this run's
      # consolidate → dbrelease step) off the GH Release. Failing to find
      # either is a structural mismatch — we abort, the operator triages.
      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist-tarballs
          gh release download "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern 'deadzone_*_linux_*.tar.gz' \
            --dir dist-tarballs
          gh release download "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern 'deadzone.db' \
            --output deadzone.db
          ls -lh dist-tarballs/ deadzone.db

      # Generate the sidecar (`deadzone.db.release`) that internal/db.Bootstrap
      # checks before trusting the cached DB. Without this file, Bootstrap
      # sees `cachedTag=""` ≠ `AppVersion=<tag>` and refuses to serve the
      # baked DB — even with DEADZONE_DB_OFFLINE=1, the offline branch
      # (bootstrap.go:228-233) errors out on the version mismatch.
      # Format is the v1 JSON shape from internal/db/sidecar.go:
      #   {"tag": "vX.Y.Z", "sha256": "<hex>", "fetched_at": "<RFC3339>"}
      # `dbrelease` does NOT upload this file (it's a local-cache artefact),
      # so we synthesise it from the just-downloaded DB and the tag input.
      - name: Generate cache sidecar
        env:
          TAG: ${{ inputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          sha=$(sha256sum deadzone.db | awk '{print $1}')
          fetched_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          # jq -n with --arg gives us safe JSON quoting for the tag, sha, and
          # timestamp without manual escaping.
          jq -n \
            --arg tag "$TAG" \
            --arg sha "$sha" \
            --arg fetched_at "$fetched_at" \
            '{tag: $tag, sha256: $sha, fetched_at: $fetched_at}' \
            > deadzone.db.release
          cat deadzone.db.release

      # Same staging shape as the deleted release.yml docker job: lay out
      # dist/linux_<arch>/{deadzone, lib/} for both arches so Dockerfile's
      # COPY dist/linux_${TARGETARCH}/... finds the binary + libonnxruntime
      # under each buildx platform. ort-meta is read once from the amd64
      # binary (no network, no embedder load — pure constants table) and
      # reused for both arches.
      - name: Stage build context
        env:
          TAG: ${{ inputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          for arch in amd64 arm64; do
            tar -xzf "dist-tarballs/deadzone_${TAG}_linux_${arch}.tar.gz" -C /tmp
            mkdir -p "dist/linux_${arch}/lib"
            mv "/tmp/deadzone_${TAG}_linux_${arch}/deadzone" "dist/linux_${arch}/deadzone"
            chmod +x "dist/linux_${arch}/deadzone"
          done
          meta=$(./dist/linux_amd64/deadzone ort-meta)
          echo "${meta}"
          for arch in amd64 arm64; do
            url=$(echo "${meta}" | jq -r --arg a "${arch}" '.platforms[] | select(.goarch==$a) | .url')
            sha=$(echo "${meta}" | jq -r --arg a "${arch}" '.platforms[] | select(.goarch==$a) | .sha256')
            test -n "${url}" && test -n "${sha}" || { echo "ort-meta missing entry for linux/${arch}" >&2; exit 1; }
            tmp=$(mktemp -d)
            curl -fL -o "${tmp}/ort.tgz" "${url}"
            echo "${sha}  ${tmp}/ort.tgz" | sha256sum -c -
            tar -C "${tmp}" -xzf "${tmp}/ort.tgz"
            # Both libonnxruntime.so (symlink) and the real ELF must
            # land — distroless has no ldconfig so dlopen needs the
            # exact name hugot's WithOnnxLibraryPath asks for.
            find "${tmp}" -maxdepth 4 \( -type f -o -type l \) -name 'libonnxruntime.so*' -exec cp -P {} "dist/linux_${arch}/lib/" \;
            ls -l "dist/linux_${arch}/lib/"
            rm -rf "${tmp}"
          done

      # QEMU is required for the per-arch `docker run --platform linux/arm64`
      # smoke after push, on this amd64 runner. The buildx build itself
      # doesn't need it — Dockerfile is COPY-only, no RUN.
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Always push (no dry-run path here; this job only runs on
      # inputs.tag != ''). buildx pushes the multi-arch manifest and both
      # per-arch images atomically; the smoke steps below validate each
      # arch by tag pull. A smoke failure leaves the freshly-pushed image
      # in place — the operator re-dispatches with a fixed Dockerfile or
      # build context, and the clobber-on-push semantics restore a good
      # state.
      - name: Build + push multi-arch image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.img.outputs.ref }}:${{ inputs.tag }}
            ${{ steps.img.outputs.ref }}:latest
          labels: |
            org.opencontainers.image.version=${{ inputs.tag }}
            org.opencontainers.image.revision=${{ github.sha }}

      # Two-stage smoke per arch:
      #   1. `--version --network none`: proves the binary launches inside
      #      the distroless rootfs (GLIBC compat + dlopen libonnxruntime
      #      + ldflags injection) with zero network access. Same shape
      #      as the pre-#203 release.yml docker job's smoke.
      #   2. `server <piped-initialize>` with default network: proves the
      #      end-to-end MCP path against the baked DB + sidecar. Network
      #      is needed because the hugot embedder downloads the ~131 MB
      #      ONNX model on first construction (internal/embed/hugot.go:128)
      #      — model weights are deliberately NOT baked per #203's "do
      #      not bake any other state" out-of-scope. The MCP `initialize`
      #      response carries the server name + protocolVersion echo,
      #      both anchors checked below.
      #
      # The AC's `--network none server` smoke is downgraded because it
      # conflicts with the model-weights-not-baked decision: hugot would
      # fail to download the model under --network none. Validating the
      # baked DB itself is achieved indirectly — if Bootstrap fell back
      # to fetching `deadzone.db` from the GH Release, the network smoke
      # would still pass (network is available) but we'd have failed
      # the bake's purpose. A logs-based assertion (no `db.fetch_*`
      # event) is left as a follow-up if the regression risk warrants it.
      - name: Smoke amd64 --version (offline)
        env:
          IMG: ${{ steps.img.outputs.ref }}:${{ inputs.tag }}
        run: docker run --rm --platform linux/amd64 --network none "$IMG" --version

      - name: Smoke amd64 server (MCP initialize, baked DB)
        env:
          IMG: ${{ steps.img.outputs.ref }}:${{ inputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          init='{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-06-18","capabilities":{},"clientInfo":{"name":"smoke","version":"1"}}}'
          out=$(echo "${init}" | docker run --rm -i --platform linux/amd64 "$IMG" server)
          echo "${out}"
          echo "${out}" | grep -q '"name":"deadzone"' || { echo "smoke FAIL: missing name=deadzone" >&2; exit 1; }
          echo "${out}" | grep -q '"protocolVersion":"2025-06-18"' || { echo "smoke FAIL: missing protocolVersion=2025-06-18" >&2; exit 1; }

      - name: Smoke arm64 --version (offline)
        env:
          IMG: ${{ steps.img.outputs.ref }}:${{ inputs.tag }}
        run: docker run --rm --platform linux/arm64 --network none "$IMG" --version

      - name: Smoke arm64 server (MCP initialize, baked DB)
        env:
          IMG: ${{ steps.img.outputs.ref }}:${{ inputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          init='{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-06-18","capabilities":{},"clientInfo":{"name":"smoke","version":"1"}}}'
          out=$(echo "${init}" | docker run --rm -i --platform linux/arm64 "$IMG" server)
          echo "${out}"
          echo "${out}" | grep -q '"name":"deadzone"' || { echo "smoke FAIL: missing name=deadzone" >&2; exit 1; }
          echo "${out}" | grep -q '"protocolVersion":"2025-06-18"' || { echo "smoke FAIL: missing protocolVersion=2025-06-18" >&2; exit 1; }
