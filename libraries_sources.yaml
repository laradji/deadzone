  # ── kind: godoc ──────────────────────────────────────────────
  # Current policy (locked 2026-05-04): kind: godoc is reserved for
  # the Go stdlib only. Third-party Go modules continue to use
  # kind: github-md — their narrative docs (READMEs, hugo sites,
  # mkdocs) typically beat go/doc-emitted API reference for the kinds
  # of queries an LLM-augmented coding agent runs (concept-finding,
  # idiomatic-pattern lookup, completions/build-config questions).
  # The proxy.golang.org + sumdb fetch path is shipped and tested
  # (#198) but no third-party entry is currently configured.
  #
  # Revisit if a specific lib surfaces a real gap (e.g. its github-md
  # corpus misses signatures the LLM keeps hallucinating). The "godoc
  # vs github-md per lib" evaluation is policy-deferred — file a new
  # research issue if scope expands beyond stdlib.
  #
  # The Go stdlib has no narrative alternative — go/doc is the only
  # source — so /golang/go/<package> entries below are the single
  # canonical place this kind is exercised in production.

  - lib_id: /golang/go/encoding/json
    description: Encoding and decoding of JSON as defined in RFC 7159. The Go standard library's reference JSON implementation, providing Marshal, Unmarshal, Encoder, Decoder, and the json.RawMessage type.
    kind: godoc
    ref: go1.26.2
    urls:
      - https://api.github.com/repos/golang/go/contents/src/encoding/json?ref={ref}


