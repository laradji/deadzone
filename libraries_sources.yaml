# Deadzone library registry — see #51, #103, #113, and the Quick start in README.md.
#
# Each entry is one library to scrape. Required fields:
#
#   lib_id   canonical "/org/project" identifier (matches db.docs.lib_id)
#   kind     source kind discriminator. Valid values:
#              - github-md         raw markdown URLs, no LLM (fast path)
#              - github-rst        raw reStructuredText URLs, no LLM
#                                  (fast path for cpython, Django, NumPy,
#                                  and other Sphinx-doc'd projects)
#              - scrape-via-agent  HTML/text via an OpenAI-compatible
#                                  chat completions endpoint (set the
#                                  DEADZONE_AGENT_ENDPOINT[_*] env vars;
#                                  see README "Scraping non-trivial doc
#                                  sources" for the full contract)
#              - godoc             Go source parsed via go/doc.
#                                  Stdlib: GitHub Contents API
#                                  (golang/go is not a Go module).
#                                  Third-party modules: proxy.golang.org
#                                  zip + sumdb verify — capability is
#                                  shipped but **policy is opt-in only**:
#                                  prefer github-md for third-party Go
#                                  modules unless empirical evaluation
#                                  shows godoc retrieval beats narrative.
#                                  See #198 (impl + ACs) and #133 (research,
#                                  closed — output was #198's locked design).
#   urls     list of doc URLs to fetch
#
# Optional:
#
#   ref       git tag or commit SHA to pin all URLs of this lib to. URLs
#             that contain the literal "{ref}" placeholder get it
#             substituted at resolve time (#103). When used at top level,
#             applies to every expanded version unless overridden.
#
#   description  short upstream-authored summary (1-2 sentences,
#             ~100-220 chars) of what this lib IS and what role it plays.
#             Mixed into the lib-row embedding alongside the normalized
#             lib_id at scrape time so search_libraries can rank on
#             semantic intent instead of lib_id token overlap alone
#             (#191). Source preference: upstream README first
#             paragraph, GitHub repo description, or official tagline —
#             whatever is authoritative. Avoid licensing/sponsorship
#             text and marketing fluff ("powerful", "blazing fast",
#             "modern") unless the upstream tagline literally uses the
#             word and dropping it loses information. Empty/missing
#             reverts to the legacy lib_id-only embedding (no behavior
#             change). Whitespace-only normalizes to "" at parse time.
#             Example:
#               description: Asynchronous runtime for Rust providing IO,
#                 scheduling, and synchronization primitives.
#
#   versions  mapping of version identifiers to per-version overrides.
#             When present, every effective URL list (baseline or a
#             per-version `urls:` override) must contain the literal
#             "{ref}" placeholder; one effective entry is produced per
#             version with lib_id "<lib_id>/<version>". The pre-#120
#             "{version}" placeholder has been retired and is rejected
#             at parse time. Shape:
#
#               versions:
#                 "1.4": { ref: v1.4.1 }       # per-version git pin
#                 "1.5": { ref: v1.5.0 }       # per-version git pin
#                 "2.0": { urls: [...] }       # per-version url list
#
#             Per-version overrides:
#               - `ref:`  pins this version's {ref} substitution,
#                         overrides the top-level `ref:` (#103).
#               - `urls:` replaces the top-level `urls:` for this version
#                         wholesale (#115). Omit the field to inherit
#                         the baseline; an explicit `urls: []` is
#                         rejected. Use this when two versions of the
#                         same lib diverge structurally, or when the
#                         URL path literal differs per version (see the
#                         `hashicorp/terraform` entry below).
#               - `description:` replaces the top-level `description:`
#                         for this version's libs-table row only (#191).
#                         Use sparingly — only when versions have
#                         meaningfully diverged (e.g. a major API
#                         rewrite). Omit to inherit the top-level
#                         description; whitespace-only normalizes to ""
#                         at parse time so it doesn't accidentally
#                         suppress inheritance.
#
#             The legacy list shape `versions: [v1, v2]` is rejected at
#             parse time — use `{"1.4": {...}, "1.5": {...}}` instead
#             (see #117).
#
# lib_id vs docs source repo:
#   `lib_id` is the canonical identifier — it matches `db.docs.lib_id`
#   and is what users query through the MCP surface. It is NOT
#   guaranteed to match the GitHub org/project that hosts the doc URLs.
#
#   When upstream splits code and docs into sibling repos (a common JS/
#   TS pattern, but also seen on Rust + Go ORMs + DBs), the lib_id stays
#   on the canonical "lib home" repo while the URLs target the docs
#   sibling. Inspect the URL host to see which repo a scrape actually
#   reads from.
#
#   Sidecar docs repos currently in use (10 of 48 entries):
#     /uptrace/bun           → uptrace/bun-docs
#     /honojs/hono           → honojs/website
#     /expressjs/express     → expressjs/expressjs.com
#     /nestjs/nest           → nestjs/docs.nestjs.com
#     /vuejs/vue             → vuejs/docs
#     /withastro/astro       → withastro/docs
#     /tokio-rs/tokio        → tokio-rs/website
#     /serde-rs/serde        → serde-rs/serde-rs.github.io
#     /dragonflydb/dragonfly → dragonflydb/documentation
#     /grafana/k6            → grafana/k6-docs
#
#   The remaining 38 entries are in-repo (lib_id's repo IS the docs
#   source). The Grafana stack ships docs in-repo under `docs/sources/`
#   monorepo-style; most other ecosystems split them out.
#
#   Patch is mechanical when needed: bump `ref:` to a new commit on the
#   docs sibling, not on the lib repo.
#
# Version-pinning conventions in this file (#120):
#   - `versions:` keys are the user-facing IDENTIFIER surfaced by the
#     MCP surface (`search_libraries`, `search_docs`). They are always
#     `major.minor` with no `v` prefix (e.g. `1.14`, `0.135`, `3.14`).
#   - The actual git tag used by the scraper lives in each version's
#     `ref:` field. URLs reference `{ref}` — not `{version}` — so the
#     patch bump (`v1.14.5` → `v1.14.6`) is a `ref:` edit that never
#     touches the user-facing identifier or the consolidated DB shape.
#   - Exception: `hashicorp/terraform` hardcodes the `v1.13.x` and
#     `v1.14.x` path literals in each version's own `urls:` block
#     (per-version URL override from #115). The repo interleaves every
#     supported terraform version under different path prefixes, so
#     the two versions share a top-level `ref:` (the web-unified-docs
#     sha) but can't share a URL template under the `{ref}`-only
#     placeholder vocabulary. Duplicating the URL list is cheap and
#     keeps the vocabulary one-placeholder-wide.
#   - Exception: `scaleway/scaleway-sdk-go` ships only
#     `v1.0.0-beta.N` prereleases, so its two active minors collapse to
#     the same `1.0` under the major.minor rule. Fallback: keep the full
#     prerelease string (`v1.0.0-beta.35`, `v1.0.0-beta.36`) as the
#     version key, and set per-version `ref:` to the same string so
#     `{ref}` substitution resolves to the git tag.
#   - We ship the last 2 minor releases of each lib's latest major
#     (#113 "2 dernières versions"); single-version when the upstream
#     has no stable tags or the URL set is trivially thin. The "last 2
#     minors" policy (#118) indexes exactly one patch per minor, which
#     is why dropping the patch from the identifier is lossless.
#
# Override this path with `deadzone scrape --config <path>`. Restrict a
# run to one library with `--lib /org/project` (matches all versions) or
# pin to one version with `--lib /org/project --version <tag>` (#113).

# Ref policy: prefer git tags; fall back to full 40-char SHAs.
# Short SHAs are forbidden — they are not collision-resistant on
# large repos and are subject to upstream GC.
libraries:
  - lib_id: /modelcontextprotocol/go-sdk
    description: Official Go SDK for the Model Context Protocol (MCP), used by clients and servers exchanging tools, prompts, and resources with LLM hosts.
    kind: github-md
    versions:
      "1.4": { ref: v1.4.1 }
      "1.5": { ref: v1.5.0 }
    urls:
      - https://raw.githubusercontent.com/modelcontextprotocol/go-sdk/{ref}/README.md
      - https://raw.githubusercontent.com/modelcontextprotocol/go-sdk/{ref}/docs/README.md
      - https://raw.githubusercontent.com/modelcontextprotocol/go-sdk/{ref}/docs/server.md
      - https://raw.githubusercontent.com/modelcontextprotocol/go-sdk/{ref}/docs/client.md
      - https://raw.githubusercontent.com/modelcontextprotocol/go-sdk/{ref}/docs/protocol.md
      - https://raw.githubusercontent.com/modelcontextprotocol/go-sdk/{ref}/docs/mcpgodebug.md
      - https://raw.githubusercontent.com/modelcontextprotocol/go-sdk/{ref}/docs/troubleshooting.md
      - https://raw.githubusercontent.com/modelcontextprotocol/go-sdk/{ref}/docs/rough_edges.md

